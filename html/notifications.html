<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TravelVerse | Notifications</title>

<link rel="stylesheet" href="/css/notifications.css">
<link rel="stylesheet" href="/css/theme.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body data-auth-required="true" data-auth-message="Please login to view notifications.">

<header class="navbar">

    <div class="logo">
        <i class="fa-solid fa-earth-americas"></i>
        TravelVerse
    </div>

    <div class="nav-links">

        <a href="home.html">Home</a>

        <a href="upload.html">Create Post</a>

        <a href="places.html">Places</a>

        <a href="profile.html">Profile</a>

        <a href="saved.html">Saved</a>

        <a href="settings.html">Settings</a>

        <a href="notifications.html" class="active">Notifications</a>

    </div>

    <button onclick="logoutUser()" class="logout-btn">Logout</button>

</header>


<main class="notifications-wrapper">

    <section class="notifications-header">

        <div>
            <h1>Notifications</h1>
            <p>Stay updated with your travel community activity.</p>
        </div>

        <button id="clearAllBtn">
            <i class="fa-solid fa-trash"></i>
            Clear All
        </button>

    </section>


    <section class="notification-stats">

        <div class="stat-card">
            <h3 id="totalNotifications">0</h3>
            <p>Total Notifications</p>
        </div>

        <div class="stat-card">
            <h3 id="unreadNotifications">0</h3>
            <p>Unread</p>
        </div>

        <div class="stat-card">
            <h3 id="readNotifications">0</h3>
            <p>Read</p>
        </div>

    </section>


    <section class="notification-card">

        <div class="section-title">
            <h2>Recent Activity</h2>

            <button id="markAllReadBtn">
                Mark All as Read
            </button>
        </div>

        <div id="notificationList" class="notification-list"></div>

    </section>

</main>


<script src="/js/theme.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/notifications.js"></script>

</body>

</html>
