<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TravelVerse | Home</title>

<link rel="stylesheet" href="/css/home.css">
<link rel="stylesheet" href="/css/theme.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- Navbar -->

<header class="navbar">

    <div class="logo">
        <i class="fa-solid fa-earth-americas"></i>
        TravelVerse
    </div>

    <div class="search">
        <i class="fa-solid fa-search"></i>
        <input type="text" placeholder="Search places...">
    </div>

    <div class="nav-icons">

        <a href="notifications.html" class="notification-link" title="Notifications">
            <i class="fa-solid fa-bell"></i>
            <span id="notificationBadge" class="notification-badge">0</span>
        </a>

        <a href="profile.html" title="Profile">
            <i class="fa-solid fa-user"></i>
        </a>

        <a href="settings.html" title="Settings">
            <i class="fa-solid fa-gear"></i>
        </a>

        <button onclick="logout()">
            Logout
        </button>

    </div>

</header>


<div class="main">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="profile-mini">

            <img 
            id="sidebarProfileImage"
            src="assets/WhatsApp Image 2026-07-13 at 03.10.00.jpeg"
            alt="Profile">

            <h3 id="sidebarProfileName">Partho Singh</h3>

            <p id="sidebarProfileUsername">@partho_singh</p>

        </div>

        <ul>

            <li>
                <a href="home.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Home</span>
                </a>
            </li>

            <li>
                <a href="upload.html">
                    <i class="fa-solid fa-camera"></i>
                    <span>Create Post</span>
                </a>
            </li>

            <li>
                <a href="places.html">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Explore Places</span>
                </a>
            </li>

            <li>
                <a href="profile.html">
                    <i class="fa-solid fa-user"></i>
                    <span>Profile</span>
                </a>
            </li>

            <li>
                <a href="saved.html">
                    <i class="fa-solid fa-bookmark"></i>
                    <span>Saved</span>
                </a>
            </li>

            <li>
                <a href="settings.html">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
            </li>

        </ul>

    </aside>


    <!-- Feed -->

    <section class="feed">

        <div class="create-post">

            <input 
            type="text"
            id="postText"
            placeholder="Share your travel story...">

            <button onclick="createPost()">
                Post
            </button>

        </div>

        <!-- Dynamic posts will load here from home.js -->
        <div id="postContainer"></div>

    </section>


    <!-- Right Sidebar -->

    <aside class="rightbar">

        <h2>Trending Places</h2>

        <div class="trend-card">
            <img src="/assets/images.jpeg" alt="Sajek Valley">
            <h4>Sajek Valley</h4>
        </div>

        <div class="trend-card">
            <img src="/assets/922_giant.jpg" alt="Sundarbans">
            <h4>Sundarbans</h4>
        </div>

        <div class="trend-card">
            <img src="/assets/image-299881-1754634544.jpg" alt="Saint Martin">
            <h4>Saint Martin</h4>
        </div>


        <!-- Home Saved Collection Widget -->

        <div class="home-saved-widget">

            <div class="saved-widget-head">
                <h2>Saved Collection</h2>
                <a href="saved.html">View All</a>
            </div>

            <div class="saved-widget-counts">

                <div>
                    <i class="fa-solid fa-location-dot"></i>
                    <span id="homeSavedPlacesCount">0</span>
                    <p>Places</p>
                </div>

                <div>
                    <i class="fa-solid fa-hotel"></i>
                    <span id="homeSavedHotelsCount">0</span>
                    <p>Hotels</p>
                </div>

            </div>

            <div id="homeSavedList" class="home-saved-list"></div>

        </div>

    </aside>

</div>

<script src="/js/theme.js"></script>
<script src="/js/home.js"></script>

</body>

</html>
